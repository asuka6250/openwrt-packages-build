name: Generate Index and Trigger Sync

on:
  workflow_dispatch: 
jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
      actions: write   
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Run index generation script
        run: bash .github/scripts/gen_index.sh

      - name: Setup UTC+8 Time
        run: |
          echo "COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Commit and push packages directory
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add packages/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: generate HTML index [${{ env.COMMIT_TIME }}]"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes detected in packages/ directory. Skipping commit."
          fi

      - name: Trigger "Sync to Pages Branch" workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering workflow on ref: ${{ github.ref_name }}"
          gh workflow run "Sync to Pages Branch" --ref ${{ github.ref_name }} -R ${{ github.repository }}
